defaults: !include ../default.yaml

overrides:
    features:
        dataset: "coco"
        batch_size: 128
        num_workers: 2

    alignment:
        llm_model_name: "roberta-base"
        lvm_model_name: "vit_base_patch14_dinov2.lvd142m"

    training:
        alignment_layer_name: "LinearAlignmentLayer"
        alignment_layer_kwargs:
            dim_alignment: 512

        clip_loss_name: "CLIPLoss"
        clip_loss:
            temperature: 0.05
            normalize_latents: true

            warmup_steps: 1000
            structure_lambda: 10.0
            structure_levels: 1
            structure_margin: 0.0
            structure_weighting: "none"

    evaluation:
        zero_shot_datasets: []
        retrieval_datasets:
            - "coco"
